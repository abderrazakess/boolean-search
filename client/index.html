    <!-- Schema: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is LinkedIn Boolean Search?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LinkedIn Boolean Search uses logical operators (AND, OR, NOT) combined with quotation marks and parentheses to create targeted search queries that find specific profiles on LinkedIn. For example: (\"Software Engineer\" OR \"Developer\") AND \"React\" NOT \"Junior\" finds senior React developers."
          }
        },
        {
          "@type": "Question",
          "name": "Does this boolean search generator work with LinkedIn Sales Navigator?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The boolean strings generated by this tool work with LinkedIn free search, LinkedIn Sales Navigator, and LinkedIn Recruiter. Simply copy the generated string and paste it into the keyword search field of any of these platforms."
          }
        },
        {
          "@type": "Question",
          "name": "Is this LinkedIn Boolean Search Generator free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, this tool is completely free to use. No signup, no credit card, no limitations. Build and copy as many boolean search strings as you need."
          }
        },
        {
          "@type": "Question",
          "name": "What is the character limit for LinkedIn boolean search strings?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LinkedIn's basic search supports up to 1,000 characters in the search field. LinkedIn Recruiter supports longer strings up to approximately 2,000 characters. Sales Navigator also supports longer queries. Our tool shows a live character count so you can stay within limits."
          }
        },
        {
          "@type": "Question",
          "name": "Does LinkedIn support wildcard searches?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No, LinkedIn does not support wildcard searches (e.g., manage* to find manager, management, etc.). You must spell out each variation explicitly, which is why using a boolean search generator that suggests keyword variations is so helpful."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use boolean search on LinkedIn mobile?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LinkedIn's mobile app has limited boolean search support. For best results, use the LinkedIn desktop site or the web browser version on mobile. Sales Navigator mobile does support some boolean operators."
          }
        },
        {
          "@type": "Question",
          "name": "What is LinkedIn X-Ray search?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LinkedIn X-Ray search uses Google to search LinkedIn's public profiles by adding 'site:linkedin.com/in/' to a Google search query. For example: site:linkedin.com/in/ \"React Developer\" \"New York\". This technique lets you find LinkedIn profiles without using LinkedIn's own search interface."
          }
        },
        {
          "@type": "Question",
          "name": "How do I use the NOT operator in LinkedIn boolean search?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Use NOT (in capitals) before a term to exclude profiles containing that word. For example: \"Software Engineer\" NOT \"Junior\" NOT \"Intern\" will find software engineers while filtering out junior and intern roles. NOT must always be capitalized on LinkedIn."
          }
        },
        {
          "@type": "Question",
          "name": "How is this tool different from other boolean search generators?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Unlike most boolean search tools that require manual input of every keyword, this generator uses AI to automatically suggest relevant keyword variations, synonyms, and related terms — organized into logical groups. It then combines them into a correctly formatted boolean string ready to paste into LinkedIn."
          }
        }
      ]
    }
    </script>
